services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d agentic_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/s1rt3ge/graphpilot-backend:${GRAPHPILOT_IMAGE_TAG:-v0.1.3}
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:${DB_PASSWORD:-localpassword}@db:5432/agentic_platform
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${FRONTEND_PORT:-3000}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    image: ghcr.io/s1rt3ge/graphpilot-frontend:${GRAPHPILOT_IMAGE_TAG:-v0.1.3}
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
    driver: local
