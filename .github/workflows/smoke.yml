name: Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-compose-smoke:
    name: Backend Compose Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start database and backend
        run: docker compose up -d db backend

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check did not become ready in time"
          docker compose logs backend
          exit 1

      - name: Register smoke user
        run: |
          curl -fsS -X POST http://localhost:8000/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"securepass123","full_name":"Smoke User","tenant_name":"Smoke Corp"}' \
            > register.json

      - name: Login smoke user
        run: |
          curl -fsS -X POST http://localhost:8000/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"securepass123"}' \
            > login.json

      - name: Fetch current user profile
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          curl -fsS http://localhost:8000/api/v1/auth/me \
            -H "Authorization: Bearer ${TOKEN}" \
            > me.json
          python -c "import json; data=json.load(open('me.json')); assert data['email']=='smoke@test.com'"

      - name: Create workflow
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          curl -fsS -X POST http://localhost:8000/api/v1/workflows/ \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"name":"Smoke Workflow","description":"CI smoke workflow","execution_pattern":"linear"}' \
            > workflow.json
          python -c "import json; data=json.load(open('workflow.json')); assert data['name']=='Smoke Workflow'"

      - name: List and fetch workflow
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          WORKFLOW_ID=$(python -c "import json; print(json.load(open('workflow.json'))['id'])")
          curl -fsS http://localhost:8000/api/v1/workflows/ \
            -H "Authorization: Bearer ${TOKEN}" \
            > workflows.json
          python -c "import json; workflow_id=json.load(open('workflow.json'))['id']; data=json.load(open('workflows.json')); assert data['total'] >= 1; assert any(item['id'] == workflow_id for item in data['items'])"
          curl -fsS http://localhost:8000/api/v1/workflows/${WORKFLOW_ID} \
            -H "Authorization: Bearer ${TOKEN}" \
            > workflow-detail.json
          python -c "import json; data=json.load(open('workflow-detail.json')); assert data['id']==json.load(open('workflow.json'))['id']"

      - name: Delete workflow
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          WORKFLOW_ID=$(python -c "import json; print(json.load(open('workflow.json'))['id'])")
          curl -fsS -X DELETE http://localhost:8000/api/v1/workflows/${WORKFLOW_ID} \
            -H "Authorization: Bearer ${TOKEN}" \
            -o /dev/null

      - name: Create tool
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          curl -fsS -X POST http://localhost:8000/api/v1/tools/ \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"name":"Smoke API Tool","description":"CI smoke tool","tool_type":"api","config":{"url":"https://api.example.com/data","method":"GET","headers":{"Authorization":"Bearer secret-token-123"}}}' \
            > tool.json
          python -c "import json; data=json.load(open('tool.json')); assert data['name']=='Smoke API Tool'; assert data['tool_type']=='api'"

      - name: List, update, and delete tool
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          TOOL_ID=$(python -c "import json; print(json.load(open('tool.json'))['id'])")
          curl -fsS http://localhost:8000/api/v1/tools/ \
            -H "Authorization: Bearer ${TOKEN}" \
            > tools.json
          python -c "import json; tool_id=json.load(open('tool.json'))['id']; data=json.load(open('tools.json')); assert any(item['id'] == tool_id for item in data)"
          curl -fsS -X PUT http://localhost:8000/api/v1/tools/${TOOL_ID} \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"description":"Updated CI smoke tool"}' \
            > tool-updated.json
          python -c "import json; data=json.load(open('tool-updated.json')); assert data['description']=='Updated CI smoke tool'"
          curl -fsS -X DELETE http://localhost:8000/api/v1/tools/${TOOL_ID} \
            -H "Authorization: Bearer ${TOKEN}" \
            -o /dev/null

      - name: Create execution workflow
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          curl -fsS -X POST http://localhost:8000/api/v1/workflows/ \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"name":"Execution Smoke Workflow","description":"CI execution smoke workflow","execution_pattern":"linear"}' \
            > exec-workflow.json
          WORKFLOW_ID=$(python -c "import json; print(json.load(open('exec-workflow.json'))['id'])")
          curl -fsS -X PUT http://localhost:8000/api/v1/workflows/${WORKFLOW_ID} \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"definition":{"nodes":[{"id":"node-1","type":"agentNode","position":{"x":0,"y":0},"data":{"label":"Smoke Agent"}}],"edges":[]}}' \
            > exec-workflow-updated.json

      - name: Start, inspect, and cancel execution
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          WORKFLOW_ID=$(python -c "import json; print(json.load(open('exec-workflow-updated.json'))['id'])")
          curl -fsS -X POST http://localhost:8000/api/v1/workflows/${WORKFLOW_ID}/execute \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"input_data":{"text":"smoke execution"}}' \
            > execution-start.json
          python -c "import json; data=json.load(open('execution-start.json')); assert data['status']=='pending'"
          EXECUTION_ID=$(python -c "import json; print(json.load(open('execution-start.json'))['execution_id'])")
          curl -fsS http://localhost:8000/api/v1/executions \
            -H "Authorization: Bearer ${TOKEN}" \
            > executions.json
          python -c "import json; execution_id=json.load(open('execution-start.json'))['execution_id']; data=json.load(open('executions.json')); assert any(item['id'] == execution_id for item in data['items'])"
          curl -fsS http://localhost:8000/api/v1/executions/${EXECUTION_ID} \
            -H "Authorization: Bearer ${TOKEN}" \
            > execution-detail.json
          python -c "import json; data=json.load(open('execution-detail.json')); assert data['id']==json.load(open('execution-start.json'))['execution_id']"
          curl -fsS http://localhost:8000/api/v1/executions/${EXECUTION_ID}/logs \
            -H "Authorization: Bearer ${TOKEN}" \
            > execution-logs.json
          python -c "import json; data=json.load(open('execution-logs.json')); assert isinstance(data, list)"
          CANCEL_HTTP_STATUS=$(curl -sS -o execution-cancel.json -w "%{http_code}" -X POST http://localhost:8000/api/v1/executions/${EXECUTION_ID}/cancel \
            -H "Authorization: Bearer ${TOKEN}")
          if [ "${CANCEL_HTTP_STATUS}" = "200" ]; then
            python -c "import json; data=json.load(open('execution-cancel.json')); assert data['status'] in ('pending', 'running', 'cancelled')"
          elif [ "${CANCEL_HTTP_STATUS}" = "409" ]; then
            python -c "import json; data=json.load(open('execution-cancel.json')); assert 'cannot cancel' in data.get('detail', '').lower()"
            curl -fsS http://localhost:8000/api/v1/executions/${EXECUTION_ID} \
              -H "Authorization: Bearer ${TOKEN}" \
              > execution-detail-after-cancel.json
            python -c "import json; data=json.load(open('execution-detail-after-cancel.json')); assert data['status'] in ('completed', 'failed', 'cancelled')"
          else
            echo "Unexpected status code from cancel endpoint: ${CANCEL_HTTP_STATUS}"
            python -c "from pathlib import Path; print(Path('execution-cancel.json').read_text())"
            exit 1
          fi

      - name: Fetch analytics endpoints
        run: |
          TOKEN=$(python -c "import json; print(json.load(open('login.json'))['access_token'])")
          curl -fsS "http://localhost:8000/api/v1/analytics/overview?period=month" \
            -H "Authorization: Bearer ${TOKEN}" \
            > analytics-overview.json
          python -c "import json; data=json.load(open('analytics-overview.json')); assert 'total_executions' in data; assert 'successful' in data; assert 'failed' in data"
          curl -fsS "http://localhost:8000/api/v1/analytics/cost-timeline?days=7" \
            -H "Authorization: Bearer ${TOKEN}" \
            > analytics-cost-timeline.json
          python -c "import json; data=json.load(open('analytics-cost-timeline.json')); assert isinstance(data, list); assert len(data) == 7"
          curl -fsS "http://localhost:8000/api/v1/analytics/workflow-breakdown?period=month" \
            -H "Authorization: Bearer ${TOKEN}" \
            > analytics-workflow-breakdown.json
          python -c "import json; data=json.load(open('analytics-workflow-breakdown.json')); assert isinstance(data, list)"
          curl -fsS "http://localhost:8000/api/v1/analytics/export?format=json" \
            -H "Authorization: Bearer ${TOKEN}" \
            > analytics-export.json
          python -c "import json; data=json.load(open('analytics-export.json')); assert isinstance(data, list)"
          curl -fsS "http://localhost:8000/api/v1/analytics/export?format=csv" \
            -H "Authorization: Bearer ${TOKEN}" \
            -D analytics-export-headers.txt \
            -o /dev/null
          python -c "from pathlib import Path; headers=Path('analytics-export-headers.txt').read_text(); assert 'text/csv' in headers.lower()"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs db backend

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
