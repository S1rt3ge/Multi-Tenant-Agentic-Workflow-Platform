name: Release Health Check

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to verify (e.g. v0.1.2)
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-release-runtime:
    name: Verify released runtime boots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "No release tag supplied"
          exit 1

      - name: Write compose file for release tag
        run: |
          cat > docker-compose.release-check.yml <<'EOF'
          services:
            db:
              image: postgres:16
              environment:
                POSTGRES_DB: agentic_workflow
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: localpassword
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres"]
                interval: 5s
                timeout: 5s
                retries: 10

            backend:
              image: ghcr.io/s1rt3ge/graphpilot-backend:${{ steps.release_tag.outputs.tag }}
              environment:
                DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/agentic_workflow
                JWT_SECRET: release-health-check-secret
                APP_ENV: development
                CORS_ORIGINS: http://localhost:3000
              depends_on:
                db:
                  condition: service_healthy
              ports:
                - "8000:8000"

            frontend:
              image: ghcr.io/s1rt3ge/graphpilot-frontend:${{ steps.release_tag.outputs.tag }}
              depends_on:
                - backend
              ports:
                - "3000:80"
          EOF

      - name: Start release stack
        run: docker compose -f docker-compose.release-check.yml up -d

      - name: Wait for backend health
        run: |
          for i in {1..45}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check failed for released images"
          exit 1

      - name: Verify frontend responds
        run: |
          curl -fsS http://localhost:3000 >/dev/null

      - name: Release check heartbeat
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"release-health-check","status":"%s","run_id":"%s","release_tag":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ steps.release_tag.outputs.tag }}" "$ts"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.release-check.yml logs db backend frontend

      - name: Stop release stack
        if: always()
        run: docker compose -f docker-compose.release-check.yml down -v
