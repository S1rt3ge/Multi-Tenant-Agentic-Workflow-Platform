name: Security Gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: security-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: python,javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

      - name: Emit security heartbeat (codeql)
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"security-codeql","status":"%s","run_id":"%s","sha":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ github.sha }}" "$ts"

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Gitleaks CLI scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.30.1 \
            detect --source=/repo --no-git --verbose

      - name: Emit security heartbeat (gitleaks)
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"security-gitleaks","status":"%s","run_id":"%s","sha":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ github.sha }}" "$ts"

  dependencies-and-license:
    name: Dependency + License Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install backend dependency scanners
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pip-licenses

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --strict

      - name: Export backend license report
        run: pip-licenses --from=mixed --format=markdown --output-file backend-licenses.md

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend npm audit (production deps — blocking)
        working-directory: frontend
        # Block on shipped (production) dependencies only. Build tooling
        # (vite/esbuild/babel) is devDependencies and never ships to users; its
        # advisories are surfaced by the informational audit below, not gated.
        run: npm audit --omit=dev --audit-level=high

      - name: Run frontend npm audit (all deps — informational)
        if: always()
        working-directory: frontend
        run: npm audit || true

      - name: Generate frontend license report
        working-directory: frontend
        run: |
          npx --yes license-checker --production --summary > ../frontend-license-summary.txt

      - name: Upload security dependency artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-dependency-reports
          path: |
            backend-licenses.md
            frontend-license-summary.txt
          if-no-files-found: ignore

      - name: Emit security heartbeat (deps+license)
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"security-deps-license","status":"%s","run_id":"%s","sha":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ github.sha }}" "$ts"

  container-scan:
    name: Container Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build backend image for scan
        run: docker build -t graphpilot-backend-scan:local ./backend

      - name: Build frontend image for scan
        run: docker build -t graphpilot-frontend-scan:local ./frontend

      # Generate the SARIF report only (|| true so report generation never aborts
      # before the SARIF upload and the waiver-aware enforcement step below).
      # The real gate is "Enforce container vulnerability gate", which fails the
      # job on High/Critical findings unless they are explicitly risk-accepted.
      # --only-fixed: gate on actionable (fixable) vulnerabilities. Unfixable
      # base-OS advisories (wont-fix / no upstream patch) are inherent noise in a
      # slim base and are excluded from the blocking SARIF; the informational full
      # scan below still records them. (|| true so report generation never aborts
      # before the SARIF upload + waiver-aware enforcement step.)
      - name: Run Anchore vulnerability scan (backend)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" \
            anchore/grype:v0.110.0 \
            graphpilot-backend-scan:local \
            --only-fixed \
            -o sarif \
            --file /workspace/backend-results.sarif || true

      - name: Run Anchore vulnerability scan (frontend)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" \
            anchore/grype:v0.110.0 \
            graphpilot-frontend-scan:local \
            --only-fixed \
            -o sarif \
            --file /workspace/frontend-results.sarif || true

      - name: Upload vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: backend-results.sarif
          # Distinct category so the two grype uploads (same tool) don't collide.
          category: grype-backend

      - name: Upload frontend vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: frontend-results.sarif
          category: grype-frontend

      - name: Enforce container vulnerability gate
        run: |
          for SARIF_PATH in backend-results.sarif frontend-results.sarif; do
            if [ ! -f "$SARIF_PATH" ]; then
              echo "Anchore SARIF file was not generated: '$SARIF_PATH'" >&2
              exit 1
            fi
          done

          python3 - <<'PY'
          import json
          import os
          from datetime import date
          from pathlib import Path

          accepted = json.loads(Path(os.environ["ACCEPTED_RISK_PATH"]).read_text(encoding="utf-8"))
          today = date.today()
          accepted_ids = set()
          expired = []
          for item in accepted.get("accepted", []):
              expires_on = date.fromisoformat(item["expires_on"])
              if expires_on < today:
                  expired.append(item["id"])
              else:
                  accepted_ids.add(item["id"])
          if expired:
              print("Expired accepted container risks:")
              for rule_id in expired:
                  print(f"- {rule_id}")
              raise SystemExit(1)

          # Block on High/Critical (CVSS security-severity >= 7.0). Grype encodes
          # this on each SARIF rule's properties["security-severity"]; relying on
          # the SARIF "level" alone misses High findings (grype emits them as
          # "warning"/"note"), which is why the previous gate never fired.
          HIGH_THRESHOLD = 7.0
          blocking = []
          waived = []

          def rule_severity_map(run):
              mapping = {}
              driver = run.get("tool", {}).get("driver", {})
              for rule in driver.get("rules", []):
                  props = rule.get("properties", {}) or {}
                  raw = props.get("security-severity")
                  try:
                      mapping[rule.get("id")] = float(raw)
                  except (TypeError, ValueError):
                      mapping[rule.get("id")] = None
              return mapping

          for sarif_path in ("backend-results.sarif", "frontend-results.sarif"):
              sarif = json.loads(Path(sarif_path).read_text(encoding="utf-8"))
              for run in sarif.get("runs", []):
                  severities = rule_severity_map(run)
                  for result in run.get("results", []):
                      rule_id = result.get("ruleId", "unknown")
                      level = (result.get("level") or "").lower()
                      severity = severities.get(rule_id)
                      is_high = (severity is not None and severity >= HIGH_THRESHOLD) or level == "error"
                      if not is_high:
                          continue
                      message = result.get("message", {}).get("text", "")
                      if rule_id in accepted_ids:
                          waived.append((rule_id, message))
                      else:
                          blocking.append((rule_id, message))

          if waived:
              print("Accepted container findings:")
              for rule_id, message in waived[:20]:
                  print(f"- {rule_id}: {message}")

          if blocking:
              print("Container scan blocking findings:")
              for rule_id, message in blocking[:20]:
                  print(f"- {rule_id}: {message}")
              raise SystemExit(1)

          print("Container vulnerability gate passed")
          PY
        env:
          ACCEPTED_RISK_PATH: .security/container-risk-accepted.json

      - name: Emit security heartbeat (container-scan)
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"security-container-scan","status":"%s","run_id":"%s","sha":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ github.sha }}" "$ts"
