name: Publish CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-graphpilot:
    name: Publish GraphPilot CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate release metadata
        run: python3 scripts/validate-release.py "${GITHUB_REF_NAME}"

      - name: Validate npm token presence
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish graphpilot package to npm
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
