name: Observability SLO

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: observability-slo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-slo-check:
    name: API SLO check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start db and backend
        run: docker compose up -d db backend

      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health did not become ready"
          exit 1

      - name: Run API SLO checks
        run: python3 scripts/check-api-slo.py --base-url http://localhost:8000 --max-health-ms 1000 --max-ready-ms 1500

      - name: Emit observability heartbeat
        if: always()
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"source":"observability-slo","status":"%s","run_id":"%s","sha":"%s","timestamp":"%s"}\n' "${{ job.status }}" "${{ github.run_id }}" "${{ github.sha }}" "$ts"

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs db backend

      - name: Stop stack
        if: always()
        run: docker compose down -v
