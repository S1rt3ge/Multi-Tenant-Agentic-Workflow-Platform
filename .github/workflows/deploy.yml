name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (tag or branch)
        required: true
        default: v0.1.2
      environment:
        description: Deployment environment name
        required: true
        default: production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Deploy Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout requested ref
        if: startsWith(github.event.inputs.ref, 'v')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Reject non-tag refs for secreted deploy preflight
        if: ${{ !startsWith(github.event.inputs.ref, 'v') }}
        run: |
          echo "Only version tags (v*) are allowed for deploy preflight."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validate release metadata when deploying tags
        if: startsWith(github.event.inputs.ref, 'v')
        run: python scripts/validate-release.py "${{ github.event.inputs.ref }}"

      - name: Validate deployment configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: python scripts/validate-deploy-config.py

      - name: Build deployment bundle manifest
        run: |
          cat <<EOF > deploy-manifest.txt
          ref=${{ github.event.inputs.ref }}
          environment=${{ github.event.inputs.environment }}
          commit=$(git rev-parse HEAD)
          deploy_path=${{ secrets.DEPLOY_PATH }}
          EOF
          cat deploy-manifest.txt

      - name: Upload deployment manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-manifest
          path: deploy-manifest.txt

      - name: Manual deployment placeholder
        run: |
          echo "Preflight checks passed."
          echo "This workflow is ready for a future SSH/runner-specific deployment step."
          echo "Target host: ${{ secrets.DEPLOY_HOST }}"
          echo "Target path: ${{ secrets.DEPLOY_PATH }}"
