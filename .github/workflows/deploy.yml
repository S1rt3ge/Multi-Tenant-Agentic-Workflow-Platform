name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (tag or branch)
        required: true
        default: v0.1.2
      environment:
        description: Deployment environment name
        required: true
        default: production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Deploy Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout requested ref
        if: startsWith(github.event.inputs.ref, 'v')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Reject non-tag refs for secreted deploy preflight
        if: ${{ !startsWith(github.event.inputs.ref, 'v') }}
        run: |
          echo "Only version tags (v*) are allowed for deploy preflight."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validate release metadata when deploying tags
        if: startsWith(github.event.inputs.ref, 'v')
        run: python scripts/validate-release.py "${{ github.event.inputs.ref }}"

      - name: Validate deployment configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: python scripts/validate-deploy-config.py

      - name: Build deployment bundle manifest
        run: |
          cat <<EOF > deploy-manifest.txt
          ref=${{ github.event.inputs.ref }}
          environment=${{ github.event.inputs.environment }}
          commit=$(git rev-parse HEAD)
          EOF
          cat deploy-manifest.txt

      - name: Upload deployment manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-manifest
          path: deploy-manifest.txt

      - name: Build deployment bundle
        run: |
          tar --exclude='.git' --exclude='frontend/node_modules' --exclude='frontend/dist' --exclude='backend/__pycache__' -czf graphpilot-deploy.tar.gz .

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/releases/${{ github.event.inputs.ref }}'"
          scp -i ~/.ssh/deploy_key graphpilot-deploy.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/releases/${{ github.event.inputs.ref }}/graphpilot-deploy.tar.gz"

      - name: Deploy on remote host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REF='${{ github.event.inputs.ref }}' DB_PASSWORD='$DB_PASSWORD' JWT_SECRET='$JWT_SECRET' OPENAI_API_KEY='$OPENAI_API_KEY' ANTHROPIC_API_KEY='$ANTHROPIC_API_KEY' CORS_ORIGINS='$CORS_ORIGINS' LOG_LEVEL='${LOG_LEVEL:-INFO}' LOG_FORMAT='${LOG_FORMAT:-json}' VITE_API_URL='$VITE_API_URL' bash -s" <<'REMOTE'
          set -euo pipefail
          release_dir="$DEPLOY_PATH/releases/$REF"
          current_dir="$DEPLOY_PATH/current"
          mkdir -p "$release_dir"
          tar -xzf "$release_dir/graphpilot-deploy.tar.gz" -C "$release_dir"
          cat > "$release_dir/.env" <<EOF
          DB_PASSWORD=$DB_PASSWORD
          JWT_SECRET=$JWT_SECRET
          OPENAI_API_KEY=$OPENAI_API_KEY
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          CORS_ORIGINS=$CORS_ORIGINS
          LOG_LEVEL=$LOG_LEVEL
          LOG_FORMAT=$LOG_FORMAT
          VITE_API_URL=$VITE_API_URL
          EOF
          ln -sfn "$release_dir" "$current_dir"
          cd "$current_dir"
          docker compose -f docker-compose.prod.yml --env-file .env up -d --build
          docker compose -f docker-compose.prod.yml --env-file .env ps
          REMOTE
