security_rules:
  - Require owner/editor role for manual retry.
  - Preserve tenant-scoped execution lookup.
  - Do not mutate source execution status or logs.
  - Do not log webhook payloads or headers.
  - Reuse existing execution creation validation where practical.
  - Require owner/editor role for pause/resume.
  - Preserve tenant-scoped workflow lookup.
  - Dispatcher must not run paused workflow webhook executions.
  - Enforce trigger rate limits before creating webhook events or executions.
  - Rate-limit errors must not expose webhook payloads or headers.
  - Dispatch health responses must contain aggregate counts only.
  - Dashboard dispatch health UI must not render webhook payloads or headers.
  - Dispatch alert policy preview must be dry-run only.
  - Do not store notification secrets in dispatch alert policy.
  - Encrypt notification channel credentials at rest.
  - Delivery audit logs must not contain payloads, webhook headers, or notification secrets.
  - Tests must mock outbound notification delivery.
  - Alert cooldown must suppress repeated delivery attempts per channel and alert code.
  - Scheduled alert evaluation worker must be config-gated and disabled by default.
  - Dispatch runbook exports must be read-only and sanitized.
  - Incident acknowledgement APIs must be tenant-scoped and sanitized.
  - Incident resolution and history APIs must be tenant-scoped and sanitized.
  - Automation worker schedule config updates must be owner-only.
  - Automation worker run audit responses must be tenant-scoped and sanitized.
  - Slice 19 must not start a background scheduler loop from stored config alone.
  - Automation scheduler must be globally disabled by default.
  - Automation scheduler must skip tenant configs that are disabled or not interval-due.
  - Automation scheduler run audit rows must be tenant-scoped and sanitized.
  - Automation scheduler must not scan tenants or execute plans when the leader lock is unavailable.
  - Automation scheduler must release the leader lock after success and scheduler-level tenant failure.
  - Skipped tenants must not consume scheduled due execution slots.
  - Tenant failure backoff must be tenant-scoped and derived from scheduled audit history.
  - Scheduler diagnostics must be owner-only, read-only, tenant-scoped, and sanitized.
  - Dashboard scheduler diagnostics must be owner-only, read-only, and sanitized.
  - Scheduler fleet snapshots must remain internal until a platform-admin authorization model exists.
  - Scheduler fleet snapshots must be read-only and sanitized across tenants.
  - Platform-admin fleet diagnostics must not be readable by tenant-local owners, editors, or viewers.
  - Tenant owners must not be able to invite or assign platform-admin roles.
  - Platform-admin fleet diagnostics must be read-only and sanitized across tenants.
  - Platform-admin fleet dashboard data must only load for platform-admin users.
  - Platform-admin fleet dashboard must be read-only and sanitized across tenants.

